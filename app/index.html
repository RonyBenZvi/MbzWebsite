<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Projects & Tasks | MBZ Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/dashboard.css">
</head>
<body>
  <header class="dashboard-header">
    <div class="header-left">
      <a href="../index.html" class="logo-link" title="Back to site">
        <span class="logo-badge">MBZ</span>
        <span class="logo-text">Projects & Tasks</span>
      </a>
    </div>
    <div class="header-right">
      <div class="search-wrap">
        <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
        <input type="search" id="search-input" placeholder="Search projects and tasks…" autocomplete="off">
      </div>
      <button type="button" class="btn btn-secondary" id="btn-import" title="Import JSON backup">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        Import
      </button>
      <button type="button" class="btn btn-secondary" id="btn-export" title="Export JSON backup">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        Export
      </button>
      <button type="button" class="btn btn-primary" id="btn-add-project">+ Project</button>
      <button type="button" class="btn btn-primary" id="btn-add-task">+ Task</button>
      <input type="file" id="import-file" accept=".json,application/json" hidden>
    </div>
  </header>

  <div id="alert-bar" class="alert-bar hidden" role="alert"></div>

  <main class="dashboard-main">
    <section class="panel projects-panel">
      <div class="panel-header">
        <h2>Projects</h2>
        <span class="panel-count" id="projects-count">0</span>
      </div>
      <div id="projects-table" class="table-container"></div>
    </section>

    <aside class="summary-panel" id="summary-panel">
      <div class="summary-empty" id="summary-empty">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.4"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>
        <p>Select a project to view summary</p>
      </div>
      <div class="summary-content hidden" id="summary-content"></div>
    </aside>

    <section class="panel tasks-panel">
      <div class="panel-header">
        <h2>Tasks</h2>
        <div class="panel-header-right">
          <label class="toggle-label" title="Show tasks from all projects">
            <input type="checkbox" id="show-all-tasks">
            <span>All projects</span>
          </label>
          <span class="filter-badge hidden" id="task-filter-badge"></span>
          <span class="panel-count" id="tasks-count">0</span>
        </div>
      </div>
      <div id="tasks-table" class="table-container"></div>
    </section>
  </main>

  <!-- Modal for add/edit -->
  <dialog id="form-modal" class="form-modal">
    <form id="entity-form" method="dialog">
      <div class="modal-header">
        <h3 id="modal-title">Add Project</h3>
        <button type="button" class="btn-icon modal-close" id="modal-close" title="Close">&times;</button>
      </div>
      <div class="modal-body" id="modal-body"></div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" id="modal-cancel">Cancel</button>
        <button type="submit" class="btn btn-primary" id="modal-submit">Save</button>
      </div>
    </form>
  </dialog>

  <script type="module" src="js/main.js"></script>
</body>
</html>
